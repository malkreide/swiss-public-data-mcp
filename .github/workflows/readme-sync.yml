name: Portfolio sync

# Fails if generated artefacts drift from portfolio.json (the source of truth):
#   * README.md / README.de.md  -> python scripts/generate_readme.py
#   * registry/*/server.json    -> python scripts/generate_server_json.py
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate portfolio.json
        run: python -c "import json; json.load(open('portfolio.json'))"
      - name: Check READMEs are in sync with portfolio.json
        run: python scripts/generate_readme.py --check
      - name: Check registry server.json files are in sync with portfolio.json
        run: python scripts/generate_server_json.py --check
